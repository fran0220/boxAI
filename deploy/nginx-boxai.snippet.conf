# BoxAI Nginx requirements (include / paste into configs)
#
# 1) REQUIRED in the http { } block of nginx.conf (NOT only in server {}):
#
#    underscores_in_headers on;
#
#    Why: Nginx drops request headers that contain underscores by default
#    (e.g. session_id). That breaks sticky multi-account sessions used with
#    Codex CLI and similar clients when BoxAI is behind a reverse proxy.
#
# 2) Recommended server {} reverse proxy to the compose app on 127.0.0.1:8080:
#    see docs/PRODUCTION.md §4.5

# --- http context (nginx.conf) ---
# http {
#     underscores_in_headers on;
#     map $http_upgrade $connection_upgrade {
#         default upgrade;
#         ''      close;
#     }
#     include /etc/nginx/sites-enabled/*;
# }

