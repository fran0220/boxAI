# BoxAI production nginx — dual-frontend topology for you-box.com
# Install: copy to /etc/nginx/sites-available/you-box.com and enable.
# Prerequisites:
#   - React build in /var/www/you-box.com (from web/dist)
#   - Backend docker on 127.0.0.1:8080
#   - Certbot certs covering you-box.com www console api (or expand with certbot)
# See docs/WEB_PLATFORM.md

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Shared proxy headers
# (inline in each location for clarity with certbot-managed files)

# ---------------------------------------------------------------------------
# Apex: React marketing + Creator; proxy API / gateway
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 200m;

    # ACME (if revalidation hits 443 rarely needed)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Block Docker-host in-app binary upgrades
    location = /api/v1/admin/system/update {
        default_type application/json;
        return 403 '{"code":403,"message":"In-app binary upgrade is disabled for Docker BoxAI. Set BOXAI_IMAGE and run docker compose pull && up -d."}';
    }
    location = /api/v1/admin/system/rollback {
        default_type application/json;
        return 403 '{"code":403,"message":"In-app binary rollback is disabled for Docker BoxAI. Use docker compose recreate with a pinned image."}';
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }

    # Hashed assets — long cache
    location /assets/ {
        root /var/www/you-box.com;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /var/www/you-box.com;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}

# ---------------------------------------------------------------------------
# www → apex
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://you-box.com$request_uri;
}

# ---------------------------------------------------------------------------
# Console: Vue embedded in Go
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name console.you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 200m;

    location = /api/v1/admin/system/update {
        default_type application/json;
        return 403 '{"code":403,"message":"In-app binary upgrade is disabled for Docker BoxAI. Set BOXAI_IMAGE and run docker compose pull && up -d."}';
    }
    location = /api/v1/admin/system/rollback {
        default_type application/json;
        return 403 '{"code":403,"message":"In-app binary rollback is disabled for Docker BoxAI."}';
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ---------------------------------------------------------------------------
# API host: edge-filtered gateway + public auth token endpoints
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    client_max_body_size 200m;

    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /api/v1/auth/boxai/sso/token {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/boxai/desktop/token {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/refresh {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/settings/public {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }

    location / {
        default_type text/plain;
        return 404 "Not Found\n";
    }
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS (all hosts) + ACME
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name you-box.com www.you-box.com console.you-box.com api.you-box.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
