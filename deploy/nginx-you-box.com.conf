# BoxAI production nginx — dual-frontend topology for you-box.com
# Install: copy to /etc/nginx/sites-available/you-box.com and enable.
# Prerequisites:
#   - React build in /var/www/you-box.com (from web/dist)
#   - Backend docker on 127.0.0.1:8080
#   - Certbot certs covering you-box.com www console api (or expand with certbot)
# See docs/WEB_PLATFORM.md

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# BOXAI: accept CF-Connecting-IP only from Cloudflare's published networks.
# Direct-origin traffic remains valid and keeps its socket source address.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

# Shared proxy headers
# (inline in each location for clarity with certbot-managed files)

# ---------------------------------------------------------------------------
# Apex: React marketing + Creator; proxy API / gateway
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src https://api.you-box.com https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https:" always;

    client_max_body_size 200m;

    # ACME (if revalidation hits 443 rarely needed)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # BOXAI: apex is deny-by-default for /api/*. Admin/setup never leave this host.
    # See docs/CUSTOMER_SHELL_UNIFICATION.md — customer product APIs only.
    location ^~ /api/v1/admin/ {
        default_type text/plain;
        return 404 "Not Found\n";
    }
    location ^~ /api/v1/setup {
        default_type text/plain;
        return 404 "Not Found\n";
    }

    # BOXAI: allowlisted same-origin browser APIs (session + customer center + auth forms).
    # Prefix families use (?:/.*)? so nested resources are covered without opening siblings.
    # BOXAI: auth/oauth/* covers start/callback/bind/pending for customer OAuth on apex.
    location ~ ^/api/v1/(settings/public|public/status(?:/[^/]+)?|auth/session|auth/session/(adopt|logout)|auth/(me|logout|revoke-all-sessions|login|login/2fa|register|send-verify-code|forgot-password|reset-password|validate-promo-code|validate-invitation-code)|auth/registration/(prepare|complete)|auth/tx/(continue|from-totp)|auth/oauth(?:/.*)?|auth/boxai/desktop/authorize|boxai/creator(?:/.*)?|keys(?:/.*)?|usage(?:/.*)?|user(?:/.*)?|groups(?:/.*)?|subscriptions(?:/.*)?|redeem(?:/.*)?|payment(?:/.*)?|announcements(?:/.*)?|channels/available|channel-monitors(?:/.*)?)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        default_type text/plain;
        return 404 "Not Found\n";
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $http_host;
    }

    # Hashed assets — long cache
    location /assets/ {
        root /var/www/you-box.com;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Repeated because nginx add_header inheritance stops at this location.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src https://api.you-box.com https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https:" always;
    }

    location / {
        root /var/www/you-box.com;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        # Repeated because nginx add_header inheritance stops at this location.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src https://api.you-box.com https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https:" always;
    }
}

# ---------------------------------------------------------------------------
# www → apex
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://you-box.com$request_uri;
}

# ---------------------------------------------------------------------------
# Console: Vue embedded in Go
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name console.you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https:" always;

    client_max_body_size 200m;

    location = /api/v1/admin/system/update {
        default_type application/json;
        return 403 '{"code":403,"message":"In-app binary upgrade is disabled for Docker BoxAI. Set BOXAI_IMAGE and run docker compose pull && up -d."}';
    }
    location = /api/v1/admin/system/rollback {
        default_type application/json;
        return 403 '{"code":403,"message":"In-app binary rollback is disabled for Docker BoxAI."}';
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ---------------------------------------------------------------------------
# API host: edge-filtered gateway + public auth token endpoints
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.you-box.com;

    ssl_certificate     /etc/letsencrypt/live/you-box.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/you-box.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # BOXAI: API host also serves the hosted Agent WebUI. It may be framed only
    # by the customer workspace; all scripts, sockets and assets stay same-origin.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors https://you-box.com" always;

    client_max_body_size 200m;

    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }


    location = /api/v1/auth/boxai/desktop/token {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/refresh {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/v1/settings/public {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $http_host;
    }

    # BOXAI: Agent Relay browser and desktop transports. Model-gateway /v1/*
    # and the public desktop auth endpoints above remain on the main backend.
    location = /healthz {
        proxy_pass http://127.0.0.1:8081/healthz;
        proxy_set_header Host $http_host;
    }

    location = /ws {
        proxy_pass http://127.0.0.1:8081/ws$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /ws/terminal {
        proxy_pass http://127.0.0.1:8081/ws/terminal$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /api/status {
        proxy_pass http://127.0.0.1:8081/api/status;
        proxy_set_header Host $http_host;
    }

    location = /api/files/import {
        proxy_pass http://127.0.0.1:8081/api/files/import;
        proxy_set_header Host $http_host;
        proxy_request_buffering off;
    }

    location ^~ /api/public/history-shares/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $http_host;
    }

    location = /image-proxy {
        proxy_pass http://127.0.0.1:8081/image-proxy$is_args$args;
        proxy_set_header Host $http_host;
    }

    location ^~ /t/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    location ^~ /liveagent.gateway.v1.AgentGateway/ {
        client_max_body_size 0;
        grpc_pass grpc://127.0.0.1:50051;
        grpc_set_header Host $http_host;
        grpc_set_header CF-Connecting-IP $remote_addr;
        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        grpc_set_header X-Forwarded-Proto $scheme;
        grpc_read_timeout 3600s;
        grpc_send_timeout 3600s;
    }

    location ^~ /api/ {
        default_type text/plain;
        return 404 "Not Found\n";
    }

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header CF-Connecting-IP $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS (all hosts) + ACME
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name you-box.com www.you-box.com console.you-box.com api.you-box.com;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
