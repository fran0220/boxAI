<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
</helmet>

<div style="display: grid; min-height: 100vh; grid-template-columns: 0.9fr 1.1fr; background: var(--bx-bg); color: var(--bx-text); font-family: var(--bx-font);">

  <!-- Left brand panel -->
  <aside data-screen-label="品牌侧栏" style="position: relative; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; border-right: 1px solid var(--bx-border); background: var(--bx-bg-deep); padding: 40px 48px;">
    <div aria-hidden="true" style="pointer-events: none; position: absolute; inset: 0; background-image: linear-gradient(var(--bx-line) 1px, transparent 1px), linear-gradient(90deg, var(--bx-line) 1px, transparent 1px); background-size: 48px 48px; -webkit-mask-image: radial-gradient(ellipse 100% 80% at 30% 20%, #000 20%, transparent 90%); mask-image: radial-gradient(ellipse 100% 80% at 30% 20%, #000 20%, transparent 90%);"></div>
    <div aria-hidden="true" style="pointer-events: none; position: absolute; top: -20%; left: -15%; width: 60%; aspect-ratio: 1; border-radius: 50%; filter: blur(52px); background: radial-gradient(circle, var(--bx-brand-soft), transparent 65%); animation: bx-aurora 18s var(--bx-ease-inout) infinite;"></div>
    <a href="#" style="position: relative; display: flex; align-items: center; gap: 9px; color: var(--bx-text); width: fit-content;" style-hover="color: var(--bx-text);">
      <img src="web/public/logo.svg" alt="" style="height: 28px; width: 28px;">
      <span style="font-size: 16px; font-weight: 800; letter-spacing: -0.02em;">BoxAI</span>
    </a>
    <div style="position: relative;">
      <p style="margin: 0; font-family: var(--bx-font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--bx-brand);">Unified AI Platform</p>
      <h1 style="margin: 14px 0 0; font-size: 36px; font-weight: 800; letter-spacing: -0.035em; line-height: 1.15;">一个账户，<br><span style="background: var(--bx-grad-hero); -webkit-background-clip: text; background-clip: text; color: transparent;">通行全部产品</span></h1>
      <div style="margin-top: 28px; display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; align-items: center; gap: 12px; border: 1px solid var(--bx-border); border-radius: var(--bx-radius-md); background: color-mix(in srgb, var(--bx-bg-elevated) 75%, transparent); padding: 12px 14px; backdrop-filter: blur(6px);">
          <span style="display: flex; height: 30px; width: 30px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 7px; background: var(--bx-brand-soft); color: var(--bx-brand);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><circle cx="9" cy="9" r="2"></circle><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path></svg></span>
          <span><span style="display: block; font-size: 13px; font-weight: 700;">在线创作台</span><span style="display: block; font-size: 11.5px; color: var(--bx-text-dim);">图像 · 视频 · 本地资产库</span></span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px; border: 1px solid var(--bx-border); border-radius: var(--bx-radius-md); background: color-mix(in srgb, var(--bx-bg-elevated) 75%, transparent); padding: 12px 14px; backdrop-filter: blur(6px);">
          <span style="display: flex; height: 30px; width: 30px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 7px; background: var(--bx-brand-soft); color: var(--bx-brand);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"></rect><line x1="8" x2="16" y1="21" y2="21"></line><line x1="12" x2="12" y1="17" y2="21"></line></svg></span>
          <span><span style="display: block; font-size: 13px; font-weight: 700;">Studio 工作台</span><span style="display: block; font-size: 11.5px; color: var(--bx-text-dim);">本地 Agent · Skills · MCP</span></span>
        </div>
        <div style="display: flex; align-items: center; gap: 12px; border: 1px solid var(--bx-border); border-radius: var(--bx-radius-md); background: color-mix(in srgb, var(--bx-bg-elevated) 75%, transparent); padding: 12px 14px; backdrop-filter: blur(6px);">
          <span style="display: flex; height: 30px; width: 30px; flex-shrink: 0; align-items: center; justify-content: center; border-radius: 7px; background: var(--bx-brand-soft); color: var(--bx-brand);"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg></span>
          <span><span style="display: block; font-size: 13px; font-weight: 700;">开放 API</span><span style="display: block; font-size: 11.5px; color: var(--bx-text-dim);">OpenAI 兼容 /v1 · 一把密钥</span></span>
        </div>
      </div>
    </div>
    <div style="position: relative; display: flex; align-items: center; justify-content: space-between; gap: 12px;">
      <span style="display: inline-flex; align-items: center; gap: 7px; font-family: var(--bx-font-mono); font-size: 11px; color: var(--bx-success);">
        <span style="width: 6px; height: 6px; border-radius: 999px; background: currentColor; animation: bx-ping 1.8s cubic-bezier(0,0,0.2,1) infinite;"></span>
        全部系统正常 · 99.9% 可用性
      </span>
      <span style="font-family: var(--bx-font-mono); font-size: 11px; color: var(--bx-text-dim);">you-box.com</span>
    </div>
  </aside>

  <!-- Right form panel -->
  <main data-screen-label="登录表单" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px;">
    <div style="width: 100%; max-width: 400px;">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 16px;">
        <div>
          <h2 style="margin: 0; font-size: 26px; font-weight: 800; letter-spacing: -0.03em;">{{ title }}</h2>
          <p style="margin: 6px 0 0; font-size: 13.5px; color: var(--bx-text-muted);">{{ subtitle }}</p>
        </div>
        <div style="display: inline-flex; padding: 3px; border-radius: 8px; border: 1px solid var(--bx-border); background: var(--bx-bg-elevated); gap: 2px;">
          <button onClick="{{ showLogin }}" style="{{ loginTabStyle }}">登录</button>
          <button onClick="{{ showSignup }}" style="{{ signupTabStyle }}">注册</button>
        </div>
      </div>

      <form style="margin-top: 28px; display: flex; flex-direction: column; gap: 14px;">
        <label style="display: block;">
          <span style="display: block; margin-bottom: 6px; font-size: 12.5px; font-weight: 600; color: var(--bx-text-soft);">邮箱</span>
          <input type="email" autocomplete="email" placeholder="you@example.com" style="width: 100%; box-sizing: border-box; border-radius: var(--bx-radius); border: 1px solid var(--bx-border-strong); background: var(--bx-bg-elevated); color: var(--bx-text); padding: 10px 13px; font-size: 14px; font-family: inherit; outline: none; transition: border-color var(--bx-dur-fast) ease, box-shadow var(--bx-dur-fast) ease;" style-focus="border-color: var(--bx-brand); box-shadow: 0 0 0 3px var(--bx-brand-ring);">
        </label>
        <label style="display: block;">
          <span style="display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12.5px; font-weight: 600; color: var(--bx-text-soft);">密码 <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}"><a href="#" style="font-weight: 500; font-size: 12px; color: var(--bx-text-dim);" style-hover="color: var(--bx-brand-bright);">忘记密码？</a></sc-if></span>
          <input type="password" autocomplete="current-password" placeholder="••••••••" style="width: 100%; box-sizing: border-box; border-radius: var(--bx-radius); border: 1px solid var(--bx-border-strong); background: var(--bx-bg-elevated); color: var(--bx-text); padding: 10px 13px; font-size: 14px; font-family: inherit; outline: none; transition: border-color var(--bx-dur-fast) ease, box-shadow var(--bx-dur-fast) ease;" style-focus="border-color: var(--bx-brand); box-shadow: 0 0 0 3px var(--bx-brand-ring);">
        </label>
        <button type="button" style="display: inline-flex; width: 100%; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; border-radius: var(--bx-radius-btn); padding: 11px 20px; font-weight: 700; font-size: 14px; font-family: inherit; background: var(--bx-grad-cta); color: var(--bx-ink); box-shadow: var(--bx-shadow-cta); transition: transform var(--bx-dur-fast) var(--bx-ease), box-shadow var(--bx-dur) var(--bx-ease);" style-hover="transform: translateY(-1px); box-shadow: 0 12px 32px -8px rgba(31,213,185,0.7);">{{ primaryCta }}</button>
        <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
          <p style="margin: 0; font-size: 11.5px; line-height: 1.6; color: var(--bx-text-dim);">提交后我们会向邮箱发送 6 位验证码完成注册。注册即代表同意 <a href="#" style="color: var(--bx-text-muted); text-decoration: underline;" style-hover="color: var(--bx-brand-bright);">服务条款</a> 与 <a href="#" style="color: var(--bx-text-muted); text-decoration: underline;" style-hover="color: var(--bx-brand-bright);">隐私政策</a>。</p>
        </sc-if>
      </form>

      <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
        <div style="margin-top: 24px;">
          <div style="display: flex; align-items: center; gap: 12px; font-family: var(--bx-font-mono); font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bx-text-dim);">
            <span style="height: 1px; flex: 1; background: var(--bx-border);"></span>
            或使用以下方式继续
            <span style="height: 1px; flex: 1; background: var(--bx-border);"></span>
          </div>
          <div style="margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
            <sc-for list="{{ oauth }}" as="o" hint-placeholder-count="4">
              <button style="display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; border-radius: var(--bx-radius); padding: 9px 14px; font-weight: 600; font-size: 13px; font-family: inherit; border: 1px solid var(--bx-border-strong); background: var(--bx-bg-elevated); color: var(--bx-text-soft); transition: border-color var(--bx-dur-fast) ease, color var(--bx-dur-fast) ease;" style-hover="border-color: var(--bx-brand); color: var(--bx-brand-bright);">{{ o }}</button>
            </sc-for>
          </div>
        </div>
      </sc-if>

      <p style="margin: 24px 0 0; text-align: center; font-size: 13px; color: var(--bx-text-muted);">
        {{ switchHint }} <a href="#" onClick="{{ switchOther }}" style="font-weight: 700; color: var(--bx-brand);" style-hover="color: var(--bx-brand-bright);">{{ switchLabel }}</a>
      </p>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { view: 'login' };
  renderVals() {
    const isLogin = this.state.view === 'login';
    const tabBase = 'border: none; background: transparent; color: var(--bx-text-dim); font-size: 12.5px; font-weight: 600; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: color 0.12s, background 0.12s;';
    const tabActive = 'border: none; background: var(--bx-active); color: var(--bx-brand-bright); font-size: 12.5px; font-weight: 700; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-family: inherit;';
    return {
      isLogin: isLogin,
      isSignup: !isLogin,
      title: isLogin ? '欢迎回来' : '创建账户',
      subtitle: isLogin ? '使用邮箱与密码登录 BoxAI' : '开始创作与调用 API',
      primaryCta: isLogin ? '登录' : '发送验证码',
      switchHint: isLogin ? '没有账户？' : '已有账户？',
      switchLabel: isLogin ? '免费注册' : '直接登录',
      loginTabStyle: isLogin ? tabActive : tabBase,
      signupTabStyle: isLogin ? tabBase : tabActive,
      oauth: ['GitHub', 'Google', '微信', 'LinuxDo'],
      showLogin: () => this.setState({ view: 'login' }),
      showSignup: () => this.setState({ view: 'signup' }),
      switchOther: (e) => { e.preventDefault(); this.setState({ view: isLogin ? 'signup' : 'login' }); },
    };
  }
}
</script>
</body>
</html>
