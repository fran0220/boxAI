<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
</helmet>

<div style="display: flex; height: 100vh; flex-direction: column; background: var(--bx-bg); color: var(--bx-text); font-family: var(--bx-font); overflow: hidden;">
  <span id="bx-tick" aria-hidden="true" style="position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; animation: bx-caret 0.06s linear infinite;"></span>
  <dc-import name="HeaderV2" active="creator" hint-size="100%,56px"></dc-import>

  <div style="display: flex; min-height: 0; flex: 1;">
    <!-- Left rail -->
    <aside data-screen-label="创作台侧栏" style="display: flex; width: 208px; flex-shrink: 0; flex-direction: column; border-right: 1px solid var(--bx-border); background: var(--bx-bg-elevated);">
      <div style="padding: 16px 14px 10px;">
        <p style="margin: 0; font-family: var(--bx-font-mono); font-size: 9.5px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bx-text-dim);">Creator Workspace</p>
      </div>
      <nav style="display: flex; flex-direction: column; gap: 2px; padding: 0 10px;">
        <sc-for list="{{ panels }}" as="p" hint-placeholder-count="3">
          <button onClick="{{ p.pick }}" aria-current="{{ p.current }}" style="{{ p.style }}">
            <span style="display: inline-flex; width: 18px; color: {{ p.iconColor }};">{{ p.icon }}</span>
            {{ p.label }}
            <span style="margin-left: auto; font-family: var(--bx-font-mono); font-size: 10px; color: var(--bx-text-dim);">{{ p.count }}</span>
          </button>
        </sc-for>
      </nav>
      <div style="margin-top: auto; padding: 14px;">
        <div style="border: 1px solid var(--bx-border); border-radius: var(--bx-radius-md); background: var(--bx-bg-card); padding: 12px 14px;">
          <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <span style="font-family: var(--bx-font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--bx-text-dim);">余额</span>
            <span style="font-family: var(--bx-font-mono); font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums;">$128.50</span>
          </div>
          <div style="margin-top: 8px; height: 4px; border-radius: 999px; background: var(--bx-bg-muted); overflow: hidden;">
            <div style="height: 100%; width: 64%; border-radius: 999px; background: var(--bx-grad-cta);"></div>
          </div>
          <p style="margin: 7px 0 0; font-family: var(--bx-font-mono); font-size: 10px; color: var(--bx-text-dim);">本月已用 $46.20 · <a href="#" style="color: var(--bx-brand);" style-hover="color: var(--bx-brand-bright);">充值</a></p>
        </div>
      </div>
    </aside>

    <!-- Body -->
    <div style="position: relative; display: flex; min-width: 0; min-height: 0; flex: 1; flex-direction: column;">

      <!-- ══ 图像 ══ -->
      <sc-if value="{{ isImage }}" hint-placeholder-val="{{ true }}">
        <div style="position: relative; display: flex; min-height: 0; flex: 1; flex-direction: column;">
          <!-- toolbar -->
          <div style="display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--bx-border); background: var(--bx-bg); padding: 8px 20px;">
            <div style="display: inline-flex; align-items: center; gap: 2px; border: 1px solid var(--bx-border); border-radius: 7px; padding: 2px; background: var(--bx-bg-elevated);">
              <button style="border: none; cursor: pointer; border-radius: 5px; padding: 5px 14px; font-size: 12.5px; font-weight: 700; font-family: inherit; background: var(--bx-active); color: var(--bx-brand-bright);">画廊</button>
              <button style="border: none; cursor: pointer; border-radius: 5px; padding: 5px 14px; font-size: 12.5px; font-weight: 600; font-family: inherit; background: transparent; color: var(--bx-text-dim);" style-hover="color: var(--bx-text);">Agent</button>
            </div>
            <div style="position: relative; flex: 1; max-width: 380px;">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--bx-text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 11px; top: 50%; transform: translateY(-50%);"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
              <input placeholder="搜索提示词、模型…" style="width: 100%; box-sizing: border-box; border-radius: 7px; border: 1px solid var(--bx-border); background: var(--bx-bg-elevated); color: var(--bx-text); padding: 6.5px 12px 6.5px 32px; font-size: 12.5px; font-family: inherit; outline: none; transition: border-color var(--bx-dur-fast) ease, box-shadow var(--bx-dur-fast) ease;" style-focus="border-color: var(--bx-brand); box-shadow: 0 0 0 3px var(--bx-brand-ring);">
            </div>
            <div style="display: flex; gap: 4px; margin-left: auto;">
              <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; font-family: inherit; background: var(--bx-active); color: var(--bx-brand-bright);">全部</button>
              <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 500; font-family: inherit; background: transparent; color: var(--bx-text-dim);" style-hover="color: var(--bx-text); background: var(--bx-hover);">收藏</button>
              <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 500; font-family: inherit; background: transparent; color: var(--bx-text-dim);" style-hover="color: var(--bx-text); background: var(--bx-hover);">生成中</button>
            </div>
            <span style="font-family: var(--bx-font-mono); font-size: 11px; color: var(--bx-text-dim);">128 items · 本地存储</span>
          </div>

          <!-- gallery -->
          <div style="flex: 1; overflow-y: auto; padding: 20px 20px 170px;">
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
              <sc-for list="{{ tiles }}" as="t" hint-placeholder-count="10">
                <div style="position: relative; overflow: hidden; border-radius: var(--bx-radius-md); border: 1px solid var(--bx-border); aspect-ratio: {{ t.ratio }}; background: {{ t.bg }}; transition: transform var(--bx-dur) var(--bx-ease), border-color var(--bx-dur) var(--bx-ease); cursor: pointer;" style-hover="transform: translateY(-2px); border-color: var(--bx-brand-ring);">
                  <sc-if value="{{ t.generating }}" hint-placeholder-val="{{ false }}">
                    <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(90deg, var(--bx-bg-muted) 25%, var(--bx-hover) 50%, var(--bx-bg-muted) 75%); background-size: 200% 100%; animation: bx-shimmer 1.6s linear infinite;">
                      <span style="font-family: var(--bx-font-mono); font-size: 11px; color: var(--bx-text-dim);">{{ t.pct }}</span>
                    </div>
                  </sc-if>
                  <div style="position: absolute; inset-inline: 0; bottom: 0; display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 8px 10px; background: linear-gradient(transparent, rgba(2,4,5,0.75)); opacity: 0; transition: opacity var(--bx-dur-fast) ease;" style-hover="opacity: 1;">
                    <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--bx-font-mono); font-size: 9.5px; color: rgba(255,255,255,0.85);">{{ t.model }}</span>
                    <span style="display: flex; gap: 4px; color: rgba(255,255,255,0.9);">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"></path></svg>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                    </span>
                  </div>
                </div>
              </sc-for>
            </div>
          </div>

          <!-- composer -->
          <div style="position: absolute; inset-inline: 0; bottom: 0; z-index: 30; padding: 0 20px 18px; background: linear-gradient(transparent, var(--bx-bg) 55%);">
            <div style="margin-inline: auto; max-width: 860px; border-radius: var(--bx-radius-lg); border: 1px solid var(--bx-border-strong); background: var(--bx-bg-elevated); box-shadow: var(--bx-shadow-pop);">
              <textarea rows="2" placeholder="描述你想生成的画面，或添加参考图进行 Remix…  ⌘↵ 生成" style="display: block; width: 100%; box-sizing: border-box; resize: none; border: none; background: transparent; color: var(--bx-text); padding: 13px 16px 4px; font-size: 13.5px; line-height: 1.55; font-family: inherit; outline: none;"></textarea>
              <div style="display: flex; align-items: center; gap: 6px; padding: 8px 10px 10px;">
                <button style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 6px; border: 1px solid var(--bx-border); background: var(--bx-bg-card); padding: 5.5px 10px; font-family: var(--bx-font-mono); font-size: 11.5px; color: var(--bx-text-soft);" style-hover="border-color: var(--bx-brand); color: var(--bx-brand-bright);">
                  gpt-image-1.5
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"></path></svg>
                </button>
                <button style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 6px; border: 1px solid var(--bx-border); background: var(--bx-bg-card); padding: 5.5px 10px; font-family: var(--bx-font-mono); font-size: 11.5px; color: var(--bx-text-soft);" style-hover="border-color: var(--bx-brand); color: var(--bx-brand-bright);">1:1</button>
                <button style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 6px; border: 1px solid var(--bx-border); background: var(--bx-bg-card); padding: 5.5px 10px; font-family: var(--bx-font-mono); font-size: 11.5px; color: var(--bx-text-soft);" style-hover="border-color: var(--bx-brand); color: var(--bx-brand-bright);">×2</button>
                <button style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 6px; border: 1px dashed var(--bx-border-strong); background: transparent; padding: 5.5px 10px; font-size: 11.5px; font-family: inherit; color: var(--bx-text-dim);" style-hover="border-color: var(--bx-brand); color: var(--bx-brand-bright);">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5h6"></path><path d="M19 2v6"></path><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"></path><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path><circle cx="9" cy="9" r="2"></circle></svg>
                  参考图
                </button>
                <span style="margin-left: auto; font-family: var(--bx-font-mono); font-size: 10.5px; color: var(--bx-text-dim);">≈ $0.04 / 张</span>
                <button style="display: inline-flex; align-items: center; gap: 7px; border: none; cursor: pointer; border-radius: 7px; padding: 8px 18px; font-weight: 700; font-size: 13px; font-family: inherit; background: var(--bx-grad-cta); color: var(--bx-ink); box-shadow: var(--bx-shadow-cta); transition: transform var(--bx-dur-fast) var(--bx-ease);" style-hover="transform: translateY(-1px);">
                  生成
                  <span style="font-family: var(--bx-font-mono); font-size: 10px; opacity: 0.7;">⌘↵</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ══ 视频 ══ -->
      <sc-if value="{{ isVideo }}" hint-placeholder-val="{{ false }}">
        <div style="flex: 1; overflow-y: auto;">
          <div style="margin-inline: auto; display: grid; max-width: 1100px; gap: 20px; padding: 24px 20px; grid-template-columns: 340px 1fr;">
            <form style="height: fit-content; position: sticky; top: 16px; display: flex; flex-direction: column; gap: 14px; border: 1px solid var(--bx-border); border-radius: var(--bx-radius-xl); background: var(--bx-bg-elevated); box-shadow: var(--bx-shadow-card); padding: 18px;">
              <h1 style="margin: 0; font-size: 15px; font-weight: 800; letter-spacing: -0.02em;">视频生成</h1>
              <div>
                <label style="display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--bx-text-soft);">模型</label>
                <input value="kling-2.5-video" style="width: 100%; box-sizing: border-box; border-radius: 7px; border: 1px solid var(--bx-border-strong); background: var(--bx-bg-card); color: var(--bx-text); padding: 8px 12px; font-size: 12.5px; font-family: var(--bx-font-mono); outline: none;" style-focus="border-color: var(--bx-brand); box-shadow: 0 0 0 3px var(--bx-brand-ring);">
              </div>
              <div>
                <label style="display: block; margin-bottom: 6px; font-size: 12px; font-weight: 600; color: var(--bx-text-soft);">提示词</label>
                <textarea placeholder="描述你想生成的视频，或添加首帧图片控制画面…" style="width: 100%; box-sizing: border-box; min-height: 104px; resize: vertical; border-radius: 7px; border: 1px solid var(--bx-border-strong); background: var(--bx-bg-card); color: var(--bx-text); padding: 8px 12px; font-size: 13px; line-height: 1.55; font-family: inherit; outline: none;" style-focus="border-color: var(--bx-brand); box-shadow: 0 0 0 3px var(--bx-brand-ring);"></textarea>
              </div>
              <button type="button" style="display: flex; width: 100%; box-sizing: border-box; align-items: center; justify-content: center; gap: 8px; border-radius: 7px; border: 1px dashed var(--bx-border-strong); background: transparent; padding: 11px 14px; font-size: 12.5px; color: var(--bx-text-muted); cursor: pointer; font-family: inherit;" style-hover="border-color: var(--bx-brand); color: var(--bx-brand-bright);">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 5h6"></path><path d="M19 2v6"></path><path d="M21 11.5V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7.5"></path><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path><circle cx="9" cy="9" r="2"></circle></svg>
                添加首帧（图生视频）
              </button>
              <button type="button" style="display: inline-flex; width: 100%; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; border-radius: 7px; padding: 10px 18px; font-weight: 700; font-size: 13.5px; font-family: inherit; background: var(--bx-grad-cta); color: var(--bx-ink); box-shadow: var(--bx-shadow-cta);" style-hover="transform: translateY(-1px);">生成视频</button>
              <p style="margin: 0; font-family: var(--bx-font-mono); font-size: 10px; color: var(--bx-text-dim); text-align: center;">≈ $0.28 / 10s · 异步任务可并行提交</p>
            </form>

            <div style="display: flex; flex-direction: column; gap: 12px;">
              <p style="margin: 0; font-family: var(--bx-font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--bx-text-dim);">任务队列</p>
              <div style="border: 1px solid var(--bx-border); border-radius: var(--bx-radius-lg); background: var(--bx-bg-elevated); box-shadow: var(--bx-shadow-card); padding: 14px 16px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                  <span style="display: inline-flex; height: 14px; width: 14px; border: 2px solid var(--bx-brand); border-top-color: transparent; border-radius: 50%; animation: bx-spin 0.9s linear infinite;"></span>
                  <span style="min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px;">产品特写环绕运镜，霓虹青色打光，10 秒</span>
                  <span style="border-radius: 4px; padding: 2px 8px; font-family: var(--bx-font-mono); font-size: 10px; font-weight: 600; background: var(--bx-brand-soft); color: var(--bx-brand);">生成中 {{ videoPct }}</span>
                </div>
                <div style="margin-top: 10px; height: 4px; border-radius: 999px; background: var(--bx-bg-muted); overflow: hidden;">
                  <div style="height: 100%; border-radius: 999px; background: var(--bx-grad-cta); width: {{ videoPct }}; transition: width 0.4s linear;"></div>
                </div>
                <p style="margin: 8px 0 0; font-family: var(--bx-font-mono); font-size: 10.5px; color: var(--bx-text-dim);">kling-2.5-video · 21:41:02 提交 · i2v</p>
              </div>

              <p style="margin: 8px 0 0; font-family: var(--bx-font-mono); font-size: 10.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--bx-text-dim);">历史生成</p>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <sc-for list="{{ videoHistory }}" as="v" hint-placeholder-count="2">
                  <div style="overflow: hidden; border: 1px solid var(--bx-border); border-radius: var(--bx-radius-lg); background: var(--bx-bg-elevated); transition: border-color var(--bx-dur-fast) ease;" style-hover="border-color: var(--bx-brand-ring);">
                    <div style="position: relative; display: flex; aspect-ratio: 16/9; align-items: center; justify-content: center; background: {{ v.bg }};">
                      <span style="display: flex; height: 38px; width: 38px; align-items: center; justify-content: center; border-radius: 8px; background: rgba(2,4,5,0.55); color: #fff; backdrop-filter: blur(4px);">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                      </span>
                      <span style="position: absolute; right: 8px; bottom: 8px; border-radius: 4px; background: rgba(2,4,5,0.6); padding: 2px 7px; font-family: var(--bx-font-mono); font-size: 9.5px; color: rgba(255,255,255,0.9);">{{ v.dur }}</span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px; padding: 9px 12px;">
                      <span style="min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: var(--bx-text-muted);">{{ v.title }}</span>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--bx-text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" x2="12" y1="15" y2="3"></line></svg>
                    </div>
                  </div>
                </sc-for>
              </div>
            </div>
          </div>
        </div>
      </sc-if>

      <!-- ══ 资产 ══ -->
      <sc-if value="{{ isAssets }}" hint-placeholder-val="{{ false }}">
        <div style="flex: 1; overflow-y: auto;">
          <div style="margin-inline: auto; max-width: 1100px; padding: 24px 20px;">
            <div style="display: flex; align-items: center; justify-content: space-between; gap: 16px;">
              <div>
                <h1 style="margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.03em;">资产库</h1>
                <p style="margin: 4px 0 0; font-size: 12.5px; color: var(--bx-text-muted);">生成历史保存在本地浏览器（IndexedDB），不会上传服务器。</p>
              </div>
              <div style="display: flex; gap: 4px;">
                <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; font-family: inherit; background: var(--bx-active); color: var(--bx-brand-bright);">全部</button>
                <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 500; font-family: inherit; background: transparent; color: var(--bx-text-dim);" style-hover="color: var(--bx-text); background: var(--bx-hover);">图像</button>
                <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 500; font-family: inherit; background: transparent; color: var(--bx-text-dim);" style-hover="color: var(--bx-text); background: var(--bx-hover);">视频</button>
                <button style="border: none; cursor: pointer; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 500; font-family: inherit; background: transparent; color: var(--bx-text-dim);" style-hover="color: var(--bx-text); background: var(--bx-hover);">收藏</button>
              </div>
            </div>
            <div style="margin-top: 18px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
              <sc-for list="{{ tiles }}" as="t" hint-placeholder-count="10">
                <div style="position: relative; overflow: hidden; border-radius: var(--bx-radius-md); border: 1px solid var(--bx-border); aspect-ratio: 1; background: {{ t.bg }}; transition: transform var(--bx-dur) var(--bx-ease), border-color var(--bx-dur) var(--bx-ease); cursor: pointer;" style-hover="transform: translateY(-2px); border-color: var(--bx-brand-ring);"></div>
              </sc-for>
            </div>
          </div>
        </div>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { panel: 'image', videoPct: 37 };
