# Production is one machine. Deploy the selected commit directly; no registry
# release or version tag is required.
name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or commit to deploy
        required: true
        default: main
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout selected commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve immutable commit
        id: revision
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build and test product web
        working-directory: web
        env:
          VITE_AGENT_REMOTE_URL: ${{ vars.VITE_AGENT_REMOTE_URL || 'https://api.you-box.com' }}
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test:run
          pnpm build

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_SSH_KEY:-}"
          install -m 700 -d ~/.ssh
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          echo "DEPLOY_SSH_KEY_PATH=$HOME/.ssh/deploy_key" >> "$GITHUB_ENV"

      - name: Deploy commit to production machine
        env:
          COMMIT_SHA: ${{ steps.revision.outputs.sha }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_ROOT: ${{ vars.DEPLOY_APP_DIR || '/opt/boxAI' }}
          DOCROOT: ${{ vars.DEPLOY_DOCROOT || '/var/www/you-box.com' }}
        run: |
          ./deploy/scripts/ci-deploy.sh
