<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="BoxAI">
  <defs>
    <linearGradient id="boxai-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="boxai-top" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="boxai-spark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="boxai-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Soft plate -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="#0f172a" opacity="0.06"/>
  <!-- Isometric open cube (gateway box) -->
  <!-- left face -->
  <path d="M36 52 L64 68 L64 100 L36 84 Z" fill="url(#boxai-face)" opacity="0.92"/>
  <!-- right face -->
  <path d="M64 68 L92 52 L92 84 L64 100 Z" fill="#0d9488" opacity="0.95"/>
  <!-- open top rim (back) -->
  <path d="M36 52 L64 36 L92 52 L64 68 Z" fill="url(#boxai-top)" opacity="0.88"/>
  <!-- open cavity (inner dark) suggesting "out of the box" -->
  <path d="M44 54 L64 42 L84 54 L64 66 Z" fill="#042f2e" opacity="0.35"/>
  <!-- Routing spark + fan-out nodes (AI intelligence emerging) -->
  <g filter="url(#boxai-glow)">
    <circle cx="64" cy="50" r="5" fill="url(#boxai-spark)"/>
    <path d="M64 50 L48 30" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M64 50 L64 22" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M64 50 L80 30" stroke="#14b8a6" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="48" cy="30" r="3.5" fill="#14b8a6"/>
    <circle cx="64" cy="22" r="3.5" fill="#06b6d4"/>
    <circle cx="80" cy="30" r="3.5" fill="#14b8a6"/>
  </g>
</svg>
